# Example configuration for the DOMjudge self-service registration app.
# Copy this file to `config.yaml` and adjust the values.

# Flask session secret. Either set it here or point `secret_key_env` at an
# environment variable holding the value. Generate one with:
#   python -c 'import secrets; print(secrets.token_urlsafe(32))'
secret_key: "change-me-to-a-long-random-string"

# Minimum required password length, enforced server-side.
min_password_length: 8

# HTTP server settings for `flask.Flask.run`. For anything beyond local use,
# put this behind a proper WSGI server / reverse proxy and set trust_proxy to 1
server:
  host: "127.0.0.1"
  port: 5000
  debug: false
  trust_proxy: 0

# DOMjudge database connection.  The password can either be set here or
# resolved from an environment variable via `password_env`.
database:
  host: "127.0.0.1"
  port: 3306
  user: "domjudge"
  database: "domjudge"
  password: "change-me"
  # password_env: DOMJUDGE_DB_PASSWORD
